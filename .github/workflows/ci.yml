name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        preset: [debug, release, release-max]
        compiler: [gcc, clang]

    env:
      CC: ${{ matrix.compiler == 'gcc' && 'gcc' || 'clang-22' }}
      CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++-22' }}
      # Ginkgo 2.0.0 is unreleased (latest official tag is v1.11.0), so we pin the exact
      # develop-branch commit the project was built against for a reproducible CI build.
      # WHEN 2.0.0 IS OFFICIALLY RELEASED: replace the SHA below with
      #     GINKGO_REF: v2.0.0
      # and switch the clone step to the simpler shallow-by-tag form (see the comment there).
      GINKGO_REF: bec4d1ad9315c222b8037500e427cda8b51fcb5e  # develop @ Ginkgo 2.0.0
      GINKGO_BUILD_REV: "1"       # bump to force a rebuild without changing GINKGO_REF
      # Google Highway is fetched-and-built by default, which is slow; cache a
      # system install instead and let CMake's find_package(hwy) pick it up.
      HIGHWAY_REF: "1.4.0"        # keep in sync with the FetchContent GIT_TAG in CMakeLists.txt
      HIGHWAY_BUILD_REV: "1"      # bump to force a rebuild without changing HIGHWAY_REF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -----------------------
      # Install GCC (apt)
      # -----------------------
      - name: Install GCC
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ libomp-dev

      # -----------------------
      # Install Clang (brew)
      # -----------------------
      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-22 libomp-22-dev

      # -----------------------
      # Install OpenBLAS/LAPACK (CBLAS + LAPACKE) for instrument/matrix.hpp
      # -----------------------
      - name: Install OpenBLAS/LAPACK (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapacke-dev

      # -----------------------
      # Restore (or build) Ginkgo — cached by version + OS + compiler
      # -----------------------
      - name: Cache Ginkgo install
        id: cache-ginkgo
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ginkgo-install
          key: ginkgo-${{ runner.os }}-${{ matrix.compiler }}-${{ env.GINKGO_REF }}-${{ env.GINKGO_BUILD_REV }}

      - name: Build and install Ginkgo (cache miss only)
        if: steps.cache-ginkgo.outputs.cache-hit != 'true'
        run: |
          # GINKGO_REF is a commit SHA (2.0.0 is unreleased), so fetch that exact
          # commit shallowly. GitHub allows fetching a SHA directly.
          # WHEN 2.0.0 IS OFFICIALLY RELEASED and GINKGO_REF becomes a tag (v2.0.0),
          # you can replace these four lines with the simpler:
          #   git clone --depth 1 --branch "$GINKGO_REF" \
          #     https://github.com/ginkgo-project/ginkgo.git ginkgo-src
          mkdir ginkgo-src && cd ginkgo-src
          git init -q
          git remote add origin https://github.com/ginkgo-project/ginkgo.git
          git fetch --depth 1 origin "$GINKGO_REF"
          git checkout -q FETCH_HEAD
          cd ..
          # When building with clang via Homebrew, ensure installed Ginkgo encodes
          # an RPATH for the Homebrew LLVM lib directory so test binaries can find libomp
          if [ "${{ matrix.compiler }}" = "clang" ]; then
          RPATH_FLAG="-DCMAKE_INSTALL_RPATH=/home/linuxbrew/.linuxbrew/opt/llvm/lib"
          else
          RPATH_FLAG=""
          fi
          cmake -S ginkgo-src -B ginkgo-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/.ginkgo-install" \
            -DGINKGO_BUILD_TESTS=OFF \
            -DGINKGO_BUILD_EXAMPLES=OFF \
            -DGINKGO_BUILD_BENCHMARKS=OFF \
            -DGINKGO_BUILD_MPI=OFF \
            -DGINKGO_BUILD_REFERENCE=ON \
            -DGINKGO_BUILD_OMP=ON \
            -DGINKGO_BUILD_CUDA=OFF \
            -DGINKGO_BUILD_HIP=OFF \
            -DGINKGO_BUILD_SYCL=OFF \
            $RPATH_FLAG
          cmake --build ginkgo-build --parallel $(nproc)
          cmake --install ginkgo-build

      - name: Point CMake at the cached Ginkgo
        run: echo "Ginkgo_ROOT=$GITHUB_WORKSPACE/.ginkgo-install" >> "$GITHUB_ENV"

      # -----------------------
      # Restore (or build) Google Highway — cached by version + OS + compiler
      # -----------------------
      - name: Cache Highway install
        id: cache-highway
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.highway-install
          key: highway-${{ runner.os }}-${{ matrix.compiler }}-${{ env.HIGHWAY_REF }}-${{ env.HIGHWAY_BUILD_REV }}

      - name: Build and install Highway (cache miss only)
        if: steps.cache-highway.outputs.cache-hit != 'true'
        run: |
          # HIGHWAY_REF is a release tag, so a shallow clone by tag is enough.
          git clone --depth 1 --branch "$HIGHWAY_REF" \
            https://github.com/google/highway.git highway-src
          cmake -S highway-src -B highway-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/.highway-install" \
            -DHWY_ENABLE_TESTS=OFF \
            -DHWY_ENABLE_EXAMPLES=OFF \
            -DHWY_ENABLE_CONTRIB=ON \
            -DHWY_ENABLE_INSTALL=ON \
            -DBUILD_TESTING=OFF
          cmake --build highway-build --parallel $(nproc)
          cmake --install highway-build

      - name: Point CMake at the cached Highway
        run: echo "hwy_ROOT=$GITHUB_WORKSPACE/.highway-install" >> "$GITHUB_ENV"

      # -----------------------
      # Configure using preset
      # -----------------------
      - name: Configure CMake (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          cmake --preset=${{ matrix.preset }}

      # -----------------------
      # Build
      # -----------------------
      - name: Build (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          cmake --build --preset=${{ matrix.preset }} --parallel $(nproc)

      # -----------------------
      # Test
      # -----------------------
      - name: Run tests (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          ctest --preset=${{ matrix.preset }} --output-on-failure
