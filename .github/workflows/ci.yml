name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        preset: [debug, release, release-max]
        compiler: [gcc, clang]

    env:
      CC: ${{ matrix.compiler == 'gcc' && 'gcc' || 'clang' }}
      CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------
      # Install GCC (apt)
      # -----------------------
      - name: Install GCC
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++

      # -----------------------
      # Install Clang (brew)
      # -----------------------
      - name: Install Homebrew
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file git
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          echo "/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH

      - name: Install Clang via brew
        if: matrix.compiler == 'clang'
        run: |
          brew install llvm
          echo "/home/linuxbrew/.linuxbrew/opt/llvm/bin" >> $GITHUB_PATH

      # -----------------------
      # Configure using preset
      # -----------------------
      - name: Configure CMake (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          cmake --preset=${{ matrix.preset }}

      # -----------------------
      # Build
      # -----------------------
      - name: Build (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          cmake --build --preset=${{ matrix.preset }}

      # -----------------------
      # Test
      # -----------------------
      - name: Run tests (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          ctest --preset=${{ matrix.preset }} --output-on-failure
