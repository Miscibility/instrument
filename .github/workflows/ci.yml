name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        build_type: [debug, release, release-max]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential

      - name: Configure CMake 
        run: |
          cmake --preset=${{ matrix.build_type }}

      - name: Run tests (${{ matrix.build_type }})
        run: |
          ctest --test-dir build/${{ matrix.build_type }} \
            --output-on-failure
