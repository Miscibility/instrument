name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        preset: [debug, release, release-max]
        compiler: [gcc, clang]

    env:
      CC: ${{ matrix.compiler == 'gcc' && 'gcc' || 'clang-22' }}
      CXX: ${{ matrix.compiler == 'gcc' && 'g++' || 'clang++-22' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -----------------------
      # Install GCC (apt)
      # -----------------------
      - name: Install GCC
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ libomp-dev

      # -----------------------
      # Install Clang 
      # -----------------------
      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-22 libomp-22-dev

      # -----------------------
      # Configure using preset
      # -----------------------
      - name: Configure CMake (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          cmake --preset=${{ matrix.preset }}

      # -----------------------
      # Build
      # -----------------------
      - name: Build (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          cmake --build --preset=${{ matrix.preset }} --parallel $(nproc)

      # -----------------------
      # Test
      # -----------------------
      - name: Run tests (${{ matrix.preset }}, ${{ matrix.compiler }})
        run: |
          ctest --preset=${{ matrix.preset }} --output-on-failure

  # ===========================================================
  # Code coverage (gcc + MPI) -> Codecov
  # ===========================================================
  coverage:
    runs-on: ubuntu-latest

    env:
      CC: gcc
      CXX: g++
      # Allow the 2-rank MPI tests to run even on small CI runners.
      MPIEXEC_PREFLAGS: --oversubscribe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install toolchain (GCC, OpenMPI, gcovr)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ libomp-dev \
                                  libopenmpi-dev openmpi-bin gcovr

      - name: Configure CMake (coverage)
        run: |
          cmake --preset=coverage -DMPIEXEC_PREFLAGS="--oversubscribe"

      - name: Build (coverage)
        run: |
          cmake --build --preset=coverage --parallel $(nproc)

      - name: Run tests and generate coverage report
        run: |
          cmake --build --preset=coverage --target coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage/coverage.xml
          slug: Miscibility/instrument
          fail_ci_if_error: true 
